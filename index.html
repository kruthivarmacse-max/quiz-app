<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START SCREEN -->
<section class="start-screen">
    <h1 class="title">Quiz App</h1>

    <input type="text" id="username" placeholder="Enter your name" />
    <button id="startBtn">Start Quiz</button>

    <div class="instructions">
        <h2>Instructions</h2>
        <p> 1 minute per question</p>
        <p>Wrong / timeout reduces score</p>
    </div>
</section>

<!-- QUIZ SCREEN -->
<section class="quiz-screen hidden">
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="card">
        <h2 id="questionText"></h2>
        <div id="options"></div>
        <p id="timer"></p>
    </div>
</section>

<!-- RESULT SCREEN -->
<section class="result-screen hidden">
    <h2>Quiz Completed</h2>
    <div id="finalResult"></div>
    <div id="leaderboard"></div>

    <button id="clearLeaderboardBtn">Clear Leaderboard</button>
    <button id="restartBtn">Restart</button>
</section>

<script src="script.js"></script>
</body>
</html>
